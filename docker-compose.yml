version: '3.8'

services:
  ffw-uebungsplaner:
    build: .
    container_name: ffw-uebungsplaner
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Persistent Volume for SQLite Database
      - ffw-data:/app/data
    env_file:
      # Load all environment variables from local .env file (excluded from git)
      - .env

volumes:
  # Named volume mapped on host to ensure SQLite data persists
  ffw-data:
    driver: local
